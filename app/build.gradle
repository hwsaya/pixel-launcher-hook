plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'dev.saya.stackedrecents'
    compileSdk 34

    defaultConfig {
        applicationId "dev.saya.stackedrecents"
        minSdk 28
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            debuggable true
        }
    }
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:82'
}
